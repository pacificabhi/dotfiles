# Change prefix from 'Ctrl+B' to 'Ctrl+A'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Mnemonic Pane Splitting:
# | (pipe) for Vertical Split (side-by-side)
bind \\ split-window -h -c '#{pane_current_path}'
# - (minus) for Horizontal Split (top/bottom)
bind - split-window -v -c '#{pane_current_path}'
# Persistent popup terminal (toggles show/hide with Ctrl+a z)
# Creates a detached session on first use, then toggles visibility
bind z if-shell -F '#{==:#{session_name},popup}' {
    detach-client
} {
    display-popup -E -w 80% -h 80% "tmux new-session -A -s popup"
}
# Unbind old keys to prevent accidental use
unbind '"'
unbind %

# Enable mouse support for selecting panes, resizing, and scrolling
set -g mouse on
